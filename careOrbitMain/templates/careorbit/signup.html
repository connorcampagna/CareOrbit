{% extends 'careorbit/base.html' %}
{% load static %}

{% block title_block %}
    CareOrbit - Signup
{% endblock %}

{% block body_block %}
<div class="d-flex justify-content-center align-items-center mt-5 mb-5">
    
    <div class="card shadow p-4 w-100" style="max-width: 600px;">
        
        <h2 class="text-center mb-4">Create Account</h2>

        {% if error %}
            <div class="alert alert-danger py-2" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'signup' %}">
            {% csrf_token %}

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="first_name" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Enter your first name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Enter your last name" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="dob" class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" id="dob" name="dob" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter your phone number">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="password1" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password1" name="password1" placeholder="Create a password" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="password2" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="password2" name="password2" placeholder="Confirm your password" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="nhsNumber" class="form-label">NHS Number</label>
                <input type="text" class="form-control" id="nhsNumber" name="nhsNumber" placeholder="NHS Number" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>

        </form>

        <p class="text-center mt-4 mb-0">
            Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Login</a>
        </p>

    </div>
</div>
{% endblock %}
