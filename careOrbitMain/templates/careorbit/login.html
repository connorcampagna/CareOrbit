{% extends 'careorbit/base.html' %}
{% load static %}

{% block title_block %}
    CareOrbit - Login
{% endblock %}

{% block body_block %}
<div class="d-flex justify-content-center align-items-center mt-5">
    
    <div class="card shadow p-4 w-100" style="max-width: 400px;">
        
        <h2 class="text-center mb-4">Login</h2>
        
        {% if error %}
            <div class="alert-danger py-2" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input 
                    type="email" 
                    class="form-control" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your Email" 
                    required
                >
            </div>

            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="password" class="form-label mb-0">Password</label>
                    <a href="{% url 'forgot_password' %}" class="text-decoration-none small">Forgot Password?</a>
                </div>
                <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password" 
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">Login</button>

        </form>

        <p class="text-center mt-4 mb-0">
            Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none fw-bold">Sign Up</a>
        </p>

    </div>
</div>
{% endblock %}
